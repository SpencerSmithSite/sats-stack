name: sats_stack
description: Local-first Bitcoin-native personal finance app.
publish_to: 'none'
version: 1.0.0+4

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database
  drift: ^2.23.0
  drift_flutter: ^0.2.8

  # Navigation
  go_router: ^16.3.0

  # HTTP / Networking
  http: ^1.3.0

  # Cryptography
  crypto: ^3.0.0
  pointycastle: ^4.0.0

  # Bitcoin
  bs58check: ^1.0.2
  bech32: ^0.2.2

  # CSV Import
  csv: ^6.0.0

  # Charts
  fl_chart: ^0.71.0

  # File Picking
  file_picker: ^10.3.10
  image_picker: ^1.1.0

  # Local Storage
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5

  # Formatting
  intl: ^0.19.0

  # App metadata
  package_info_plus: ^8.0.0

  # Local Notifications
  flutter_local_notifications: ^19.5.0

  # PDF text extraction
  syncfusion_flutter_pdf: ^28.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
  fonts:
    - family: RobotoMono
      fonts:
        - asset: assets/fonts/RobotoMono-Regular.ttf
        - asset: assets/fonts/RobotoMono-Medium.ttf

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.23.0
  build_runner: ^2.4.14
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.0

flutter_native_splash:
  color: "#141414"
  image: assets/icons/satsstack_icon_dark.png
  android: true
  ios: true
